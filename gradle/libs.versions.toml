firebase-crashlytics = { id = "com.google.firebase.crashlytics",               version = "3.0.4" }

# ── Kotlin Multiplatform (KMP) migration — Phase 0, Spike A ──────────────────────────────────────
# kotlin-multiplatform: the KMP Kotlin plugin (commonMain + per-target source sets).
# android-kmp-library: AGP 9's dedicated KMP Android-target plugin
#   (com.android.kotlin.multiplatform.library). Chosen over the legacy
#   `com.android.library` + `kotlin { androidTarget() }` combo because AGP 9 removed the standalone
#   Kotlin-Android plugin (see root build.gradle.kts note) and the new plugin is the supported way to
#   add an Android target to a KMP module — the Android config lives under `kotlin { androidLibrary { } }`.
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform",            version.ref = "kotlin" }
android-kmp-library  = { id = "com.android.kotlin.multiplatform.library",      version.ref = "agp" }
compose-multiplatform = { id = "org.jetbrains.compose",                        version.ref = "compose-multiplatform" }
