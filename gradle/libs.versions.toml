# KMP commonTest assertions (multiplatform-safe; replaces JUnit/MockK in commonMain test source sets).
kotlin-test = { group = "org.jetbrains.kotlin", name = "kotlin-test", version.ref = "kotlin" }

# Koin (Phase 0 Spike D — Hilt/Koin coexistence). koin-core is KMP-common-safe; koin-android adds
# androidContext()/androidLogger; koin-androidx-compose provides koinViewModel() for Composables.
# (koin-compose-viewmodel is the pure-CMP equivalent — reserved for the wasmJs app in Phase 3.)
koin-core = { group = "io.insert-koin", name = "koin-core", version.ref = "koin" }
koin-android = { group = "io.insert-koin", name = "koin-android", version.ref = "koin" }
koin-androidx-compose = { group = "io.insert-koin", name = "koin-androidx-compose", version.ref = "koin" }
